<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万能小爱 - 知识库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            overflow: hidden;
            background: #f8f9fc;
        }

        .sidebar {
            width: 160px;
            background: #eef2ff;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 16px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1e40af;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .sidebar-logo {
            width: 24px;
            height: 24px;
            background: #1e40af;
            border-radius: 6px;
            display: grid;
            place-items: center;
            color: white;
            font-weight: bold;
        }

        .sidebar-menu {
            flex: 1;
            padding: 8px 0;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            font-size: 14px;
            color: #334155;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            border-radius: 6px;
            border: 2px solid transparent;
        }

        .menu-item:hover {
            background: #dbeafe;
            color: #1e40af;
            font-weight: 500;
            border: 2px solid #1d4ed8;
            box-shadow: 0 0 8px #3b82f6;
        }

        .menu-item.active {
            background: #dbeafe;
            color: #1e40af;
            font-weight: 500;
            border: 2px solid #1d4ed8;
        }

        .sidebar-footer {
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .footer-btn {
            padding: 10px;
            font-size: 13px;
            color: #1e40af;
            background: #e0e7ff;
            border: 2px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .footer-btn:hover {
            border: 2px solid #1d4ed8;
            box-shadow: 0 0 8px #3b82f6;
            background: #dbeafe;
            font-weight: 500;
        }

        .login-btn {
            background: #4f46e5;
            color: white;
            padding: 12px;
            font-weight: 500;
            text-align: center;
            white-space: nowrap;
        }

        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .knowledge-left {
            width: 60%;
            padding: 20px;
            overflow-y: auto;
            background: #fff;
        }

        .knowledge-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .knowledge-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            color: #1e40af;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-outline {
            background: white;
            color: #1e40af;
            border: 1px solid #1e40af;
        }

        .btn-primary {
            background: #1e40af;
            color: white;
        }

        .search-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .search-bar input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
        }

        /* 文件夹区域 */
        .folder-group {
            margin-bottom: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .folder-item {
            padding: 8px 12px;
            background: #e0e7ff;
            border: 1px solid #1d4ed8;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .folder-item.active {
            background: #1d4ed8;
            color: white;
        }
        .folder-item.drop-over {
            background: #bfdbfe;
            border-style: dashed;
        }

        /* 待拖拽文件区域 */
        .temp-files {
            margin: 10px 0;
            padding: 10px;
            background: #f8fafc;
            border-radius: 6px;
            min-height: 50px;
        }
        .temp-file-item {
            padding: 6px 10px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            margin-bottom: 6px;
            font-size: 13px;
            cursor: grab;
            user-select: none;
        }
        .temp-file-item:active {
            cursor: grabbing;
        }

        /* 文件展示区域 */
        .file-group {
            margin-bottom: 20px;
        }
        .file-card {
            padding: 8px 12px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 6px;
        }
        .file-card.highlight {
            background: #fff9c4;
            border-color: #fbc02d;
        }

        .empty-tip {
            text-align: center;
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 16px;
        }

        .hero-card {
            background: linear-gradient(90deg, #3b82f6, #6366f1);
            color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }

        .hero-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .hero-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .hero-desc {
            font-size: 13px;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .steps {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .step {
            background: #f1f5f9;
            padding: 16px;
            border-radius: 8px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .step-number {
            width: 24px;
            height: 24px;
            background: #93c5fd;
            color: #1e40af;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 12px;
            font-weight: 600;
        }

        .step-content h4 {
            font-size: 14px;
            color: #1e293b;
            margin-bottom: 4px;
        }
        .step-content p {
            font-size: 12px;
            color: #64748b;
        }

        .knowledge-right {
            width: 40%;
            background: #f8f9fc;
            border-left: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 16px;
        }

        .message {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 10px;
            max-width: 85%;
            font-size: 13px;
            line-height: 1.5;
        }

        .user-message {
            background: #dbeafe;
            color: #1e40af;
            margin-left: auto;
        }

        .ai-message {
            background: white;
            border: 1px solid #e2e8f0;
            color: #334155;
            margin-right: auto;
        }

        .question-input {
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 16px;
            background: white;
        }

        .question-input textarea {
            width: 100%;
            border: none;
            outline: none;
            resize: none;
            font-size: 14px;
            min-height: 60px;
            margin-bottom: 12px;
        }

        .question-tools {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .folder-check-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            font-size: 12px;
        }

        .send-btn {
            background: #1e40af;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 16px;
            cursor: pointer;
        }

        .disclaimer {
            font-size: 12px;
            color: #9ca3af;
            text-align: center;
            margin-top: 12px;
        }

        #fileInput {
            display: none;
        }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-header" onclick="location.href='index.html'">
        <div class="sidebar-logo">🤖</div>
        万能小爱
    </div>
    <div class="sidebar-menu">
        <div class="menu-item" onclick="location.href='index.html'">🏠 首页</div>
        <div class="menu-item">💬 AI提问</div>
        <div class="menu-item">✍️ AI写作</div>
        <div class="menu-item">📖 AI写书</div>
        <div class="menu-item active">📚 知识库</div>
        <div class="menu-item">🔍 学术搜索</div>
    </div>
    <div class="sidebar-footer">
        <button class="footer-btn">⬇️ 下载APP</button>
        <button class="footer-btn">✓ 使用攻略</button>
        <button class="footer-btn login-btn">登录</button>
    </div>
</div>

<div class="main">
    <div class="knowledge-left">
        <div class="knowledge-header">
            <div class="knowledge-title"><span>🧠</span> 知识库</div>
            <div class="header-actions">
                <button class="btn btn-outline" onclick="createFolder()">📁 新建文件夹</button>
                <button class="btn btn-primary" onclick="selectTempFiles()">➕ 添加文件</button>
            </div>
        </div>

        <div class="search-bar">
            <input id="searchInput" type="text" placeholder="搜索所有文件名称">
            <button class="btn btn-primary" onclick="doSearch()">搜索</button>
        </div>

        <!-- 文件夹展示区（搜索框正下方） -->
        <div id="folderList" class="folder-group"></div>

        <!-- 拖拽区：添加的文件先放这里 -->
        <div id="tempFiles" class="temp-files" style="display:none;">
            <h4 style="margin-bottom:8px;font-size:14px;color:#1e40af;">🖱️ 拖拽文件到文件夹</h4>
        </div>

        <!-- 文件展示区 -->
        <div id="fileList" class="file-group"></div>

        <div class="empty-tip">请新建文件夹并上传文件，开始使用知识库</div>

        <div class="hero-card">
            <div class="hero-icon">🧠</div>
            <div class="hero-title">搭建你的AI数字外脑</div>
            <div class="hero-desc">文档越多，提问创作越准确</div>
        </div>

        <div class="steps">
            <div class="step">
                <div class="step-number">1</div>
                <div class="step-content"><h4>新建文件夹</h4><p>分类管理你的文档</p></div>
            </div>
            <div class="step">
                <div class="step-number">2</div>
                <div class="step-content"><h4>上传/拖拽文件</h4><p>点击文件夹 或 拖拽添加</p></div>
            </div>
            <div class="step">
                <div class="step-number">3</div>
                <div class="step-content"><h4>勾选文件夹提问</h4><p>AI 只读取选中内容</p></div>
            </div>
        </div>
    </div>

    <div class="knowledge-right">
        <div class="chat-box" id="chatBox">
            <div class="message ai-message">你好！请先创建文件夹并上传文件，再勾选文件夹进行提问 😊</div>
        </div>

        <div class="question-input">
            <textarea id="question" placeholder="对知识库进行提问（基于豆包大模型）"></textarea>
            
            <div class="question-tools">
                <div id="askFolderCheck" class="folder-check-group"></div>
                <button class="send-btn" id="sendBtn">➤ 发送</button>
            </div>
        </div>

        <div class="disclaimer">回复由豆包大模型生成，内容仅供参考</div>
    </div>
</div>

<input type="file" id="fileInput" multiple>

<script>
    // ==============================================
    // 全局数据
    // ==============================================
    let folders = [];
    let folderId = 1;
    let tempFiles = []; // 待拖拽文件

    const folderListEl = document.getElementById('folderList');
    const tempFilesEl = document.getElementById('tempFiles');
    const fileListEl = document.getElementById('fileList');
    const askFolderCheckEl = document.getElementById('askFolderCheck');
    const fileInput = document.getElementById('fileInput');
    const searchInput = document.getElementById('searchInput');
    const chatBox = document.getElementById('chatBox');
    const questionInput = document.getElementById('question');
    const sendBtn = document.getElementById('sendBtn');

    // ==============================================
    // 1. 新建文件夹（搜索框下方）
    // ==============================================
    function createFolder() {
        const name = prompt("输入文件夹名称");
        if (!name) return;
        folders.push({ id: folderId++, name, files: [] });
        renderFolders();
        renderAskCheckboxes();
    }

    // 渲染文件夹 + 拖拽支持
    function renderFolders() {
        folderListEl.innerHTML = '';
        folders.forEach(f => {
            const div = document.createElement('div');
            div.className = 'folder-item';
            div.innerText = `📁 ${f.name}`;
            div.dataset.fid = f.id;
            
            // 点击 → 直接上传
            div.onclick = () => uploadToFolder(f.id);
            
            // 拖拽目标
            div.setAttribute('droppable', true);
            div.ondragover = e => {
                e.preventDefault();
                div.classList.add('drop-over');
            };
            div.ondragleave = () => div.classList.remove('drop-over');
            div.ondrop = e => {
                e.preventDefault();
                div.classList.remove('drop-over');
                const fileIndex = +e.dataTransfer.getData('file-index');
                moveTempFileToFolder(fileIndex, f.id);
            };

            folderListEl.appendChild(div);
        });
    }

    // ==============================================
    // 2. 点击文件夹 → 直接上传
    // ==============================================
    function uploadToFolder(fid) {
        const folder = folders.find(x => x.id === fid);
        fileInput.onchange = async e => {
            const files = e.target.files;
            for (let f of files) {
                folder.files.push({
                    name: f.name,
                    content: await f.text().then(t => t.slice(0, 3000))
                });
            }
            showFolderFiles(fid);
            alert(`已上传 ${files.length} 个文件到【${folder.name}】`);
        };
        fileInput.click();
    }

    // ==============================================
    // 3. 添加文件 → 进入待拖拽区（可拖拽进文件夹）
    // ==============================================
    function selectTempFiles() {
        fileInput.onchange = async e => {
            const files = e.target.files;
            tempFiles = [];
            for (let f of files) {
                tempFiles.push({
                    name: f.name,
                    content: await f.text().then(t => t.slice(0, 3000))
                });
            }
            renderTempFiles();
        };
        fileInput.click();
    }

    // 渲染待拖拽文件
    function renderTempFiles() {
        if (tempFiles.length === 0) {
            tempFilesEl.style.display = 'none';
            return;
        }
        tempFilesEl.style.display = 'block';
        tempFilesEl.innerHTML = `<h4 style="margin-bottom:8px;font-size:14px;color:#1e40af;">🖱️ 拖拽文件到文件夹</h4>`;
        
        tempFiles.forEach((f, idx) => {
            const item = document.createElement('div');
            item.className = 'temp-file-item';
            item.innerText = `📄 ${f.name}`;
            item.draggable = true;
            item.ondragstart = e => e.dataTransfer.setData('file-index', idx);
            tempFilesEl.appendChild(item);
        });
    }

    // 拖拽 → 移入文件夹
    function moveTempFileToFolder(fileIndex, fid) {
        const file = tempFiles[fileIndex];
        const folder = folders.find(x => x.id === fid);
        folder.files.push(file);
        tempFiles.splice(fileIndex, 1);
        renderTempFiles();
        showFolderFiles(fid);
        alert(`已将【${file.name}】移入【${folder.name}】`);
    }

    // ==============================================
    // 显示文件夹内文件
    // ==============================================
    function showFolderFiles(fid) {
        const f = folders.find(x => x.id === fid);
        fileListEl.innerHTML = `<h4 style="margin-bottom:8px;font-size:14px;color:#1e40af;">📂 ${f.name}</h4>`;
        f.files.forEach(file => {
            const div = document.createElement('div');
            div.className = 'file-card';
            div.innerText = `✅ ${file.name}`;
            fileListEl.appendChild(div);
        });
    }

    // ==============================================
    // 搜索文件
    // ==============================================
    function doSearch() {
        const kw = searchInput.value.trim().toLowerCase();
        if (!kw) { alert("请输入关键词"); return; }
        let res = [];
        folders.forEach(f => {
            f.files.forEach(file => {
                if (file.name.toLowerCase().includes(kw)) res.push({ f: f.name, file: file.name });
            });
        });
        if (res.length === 0) {
            fileListEl.innerHTML = `<div style="color:red">❌ 未找到「${kw}」</div>`;
            return;
        }
        fileListEl.innerHTML = `<h4>🔍 搜索结果：${res.length} 个</h4>`;
        res.forEach(item => {
            const div = document.createElement('div');
            div.className = 'file-card highlight';
            div.innerText = `📁 ${item.f} → ${item.file}`;
            fileListEl.appendChild(div);
        });
    }

    // ==============================================
    // 提问勾选框
    // ==============================================
    function renderAskCheckboxes() {
        askFolderCheckEl.innerHTML = '';
        folders.forEach(f => {
            const lb = document.createElement('label');
            lb.style.display = 'flex';
            lb.style.alignItems = 'center';
            lb.style.gap = '4px';
            const ip = document.createElement('input');
            ip.type = 'checkbox';
            ip.value = f.id;
            ip.className = 'ask-folder-checkbox';
            lb.appendChild(ip);
            lb.append(` ${f.name}`);
            askFolderCheckEl.appendChild(lb);
        });
    }

    // ==============================================
    // AI 提问
    // ==============================================
    function getSelectedContent() {
        let c = '';
        document.querySelectorAll('.ask-folder-checkbox:checked').forEach(chk => {
            const fid = +chk.value;
            const f = folders.find(x => x.id === fid);
            c += `\n=== ${f.name} ===`;
            f.files.forEach(file => {
                c += `\n--- ${file.name} ---\n${file.content}`;
            });
        });
        return c;
    }

    async function askAI(q) {
        const cnt = getSelectedContent();
        if (!cnt) return "❗ 请勾选文件夹并确保有文件";
        try {
            const r = await fetch("https://api.mnapi.top/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "doubao-pro-32k",
                    messages: [{ role: "user", content: `只根据文档回答，不编造：\n${cnt}\n问题：${q}` }]
                })
            });
            const d = await r.json();
            return "📘 基于文件夹回答：\n" + (d.choices[0]?.message?.content || "无结果");
        } catch {
            return "⚠️ 接口不可用，已切换联网回答：\n" + await normalAI(q);
        }
    }

    async function normalAI(q) {
        try {
            const r = await fetch("https://api.mnapi.top/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ model: "doubao-pro-32k", messages: [{ role: "user", content: q }] })
            });
            const d = await r.json();
            return d.choices[0]?.message?.content || "AI 回答失败";
        } catch {
            return "网络异常";
        }
    }

    sendBtn.onclick = async () => {
        const t = questionInput.value.trim();
        if (!t) return;
        chatBox.innerHTML += `<div class="message user-message">${t}</div>`;
        questionInput.value = '';
        chatBox.scrollTop = 99999;
        chatBox.innerHTML += `<div class="message ai-message">思考中...</div>`;
        const ans = await askAI(t);
        chatBox.lastElementChild.textContent = ans;
        chatBox.scrollTop = 99999;
    };

    questionInput.onkeydown = e => {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendBtn.click();
        }
    };
</script>
</body>
</html>
