<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万能小爱 - 知识库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            overflow: hidden;
            background: #f8f9fc;
        }

        .sidebar {
            width: 160px;
            background: #eef2ff;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 16px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1e40af;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .sidebar-logo {
            width: 24px;
            height: 24px;
            background: #1e40af;
            border-radius: 6px;
            display: grid;
            place-items: center;
            color: white;
            font-weight: bold;
        }

        .sidebar-menu {
            flex: 1;
            padding: 8px 0;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            font-size: 14px;
            color: #334155;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            border-radius: 6px;
            border: 2px solid transparent;
        }

        .menu-item:hover {
            background: #dbeafe;
            color: #1e40af;
            font-weight: 500;
            border: 2px solid #1d4ed8;
            box-shadow: 0 0 8px #3b82f6;
        }

        .menu-item.active {
            background: #dbeafe;
            color: #1e40af;
            font-weight: 500;
            border: 2px solid #1d4ed8;
        }

        .sidebar-footer {
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .footer-btn {
            padding: 10px;
            font-size: 13px;
            color: #1e40af;
            background: #e0e7ff;
            border: 2px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .footer-btn:hover {
            border: 2px solid #1d4ed8;
            box-shadow: 0 0 8px #3b82f6;
            background: #dbeafe;
            font-weight: 500;
        }

        .login-btn {
            background: #4f46e5;
            color: white;
            padding: 12px;
            font-weight: 500;
            text-align: center;
            white-space: nowrap;
        }

        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .knowledge-left {
            width: 60%;
            padding: 20px;
            overflow-y: auto;
            background: #fff;
        }

        .knowledge-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .knowledge-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            color: #1e40af;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-outline {
            background: white;
            color: #1e40af;
            border: 1px solid #1e40af;
        }

        .btn-primary {
            background: #1e40af;
            color: white;
        }

        .search-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .search-bar input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
        }

        .empty-tip {
            text-align: center;
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 16px;
        }

        .hero-card {
            background: linear-gradient(90deg, #3b82f6, #6366f1);
            color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }

        .hero-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .hero-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .hero-desc {
            font-size: 13px;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .steps {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .step {
            background: #f1f5f9;
            padding: 16px;
            border-radius: 8px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .step-number {
            width: 24px;
            height: 24px;
            background: #93c5fd;
            color: #1e40af;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 12px;
            font-weight: 600;
        }

        /* 🔥 修复1：缩小红框内文字，使界面更紧凑 */
        .step-content h4 {
            font-size: 14px; /* 缩小 */
            color: #1e293b;
            margin-bottom: 4px;
        }
        .step-content p {
            font-size: 12px; /* 缩小 */
            color: #64748b;
        }

        .knowledge-right {
            width: 40%;
            background: #f8fafc;
            border-left: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 16px;
        }

        /* 🔥 修复2：缩小右侧对话气泡字体，统一视觉 */
        .message {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 10px;
            max-width: 85%;
            font-size: 13px; /* 全局缩小字体 */
            line-height: 1.5;
        }

        .user-message {
            background: #dbeafe;
            color: #1e40af;
            margin-left: auto;
        }

        .ai-message {
            background: white;
            border: 1px solid #e2e8f0;
            color: #334155;
            margin-right: auto;
        }

        .question-input {
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 16px;
            background: white;
        }

        .question-input textarea {
            width: 100%;
            border: none;
            outline: none;
            resize: none;
            font-size: 14px;
            min-height: 60px;
            margin-bottom: 12px;
        }

        .question-tools {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 16px;
        }

        .send-btn {
            background: #1e40af;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 16px;
            cursor: pointer;
        }

        .disclaimer {
            font-size: 12px;
            color: #9ca3af;
            text-align: center;
            margin-top: 12px;
        }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-header" onclick="location.href='index.html'">
        <div class="sidebar-logo">🤖</div>
        万能小爱
    </div>
    <div class="sidebar-menu">
        <div class="menu-item" onclick="location.href='index.html'">🏠 首页</div>
        <div class="menu-item">💬 AI提问</div>
        <div class="menu-item">✍️ AI写作</div>
        <div class="menu-item">📖 AI写书</div>
        <div class="menu-item active">📚 知识库</div>
        <div class="menu-item">🔍 学术搜索</div>
    </div>
    <div class="sidebar-footer">
        <button class="footer-btn">⬇️ 下载APP</button>
        <button class="footer-btn">✓ 使用攻略</button>
        <button class="footer-btn login-btn">登录</button>
    </div>
</div>

<div class="main">
    <div class="knowledge-left">
        <div class="knowledge-header">
            <div class="knowledge-title"><span>🧠</span> 知识库</div>
            <div class="header-actions">
                <button class="btn btn-outline" onclick="document.getElementById('fileInput').click()">📁 新建文件夹</button>
                <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">➕ 添加文件</button>
                <input type="file" id="fileInput" style="display:none" multiple>
            </div>
        </div>

        <div class="search-bar">
            <input type="text" placeholder="搜索文件名、文件夹名称">
            <button class="btn btn-primary">搜索</button>
        </div>

        <div id="fileList" class="file-list" style="display:none;">
            <h4 style="margin-bottom:8px;font-size:14px;color:#1e40af;">已上传文件</h4>
        </div>

        <div class="empty-tip">当前目录下暂无文件，上传一个文件，开始使用您的知识库吧</div>

        <div class="hero-card">
            <div class="hero-icon">🧠</div>
            <div class="hero-title">搭建你的AI数字外脑</div>
            <div class="hero-desc">文档越多，提问创作越准确</div>
            <button class="btn btn-outline" style="background:white;color:#1e40af;" onclick="document.getElementById('fileInput').click()">➕ 添加文件</button>
        </div>

        <div class="steps">
            <div class="step">
                <div class="step-number">1</div>
                <div class="step-content"><h4>上传文档</h4><p>支持 TXT、PDF、DOCX 等文档</p></div>
            </div>
            <div class="step">
                <div class="step-number">2</div>
                <div class="step-content"><h4>向文档提问</h4><p>AI 自动读取内容并回答</p></div>
            </div>
            <div class="step">
                <div class="step-number">3</div>
                <div class="step-content"><h4>基于文档写作</h4><p>精准引用文档内容</p></div>
            </div>
        </div>
    </div>

    <div class="knowledge-right">
        <div class="chat-box" id="chatBox">
            <div class="message ai-message">你好！请上传文件，我将基于文档内容为你回答 😊</div>
        </div>

        <div class="question-input">
            <textarea id="question" placeholder="对知识库进行提问（基于豆包大模型）"></textarea>
            <div class="question-tools">
                <button class="send-btn" id="sendBtn">➤ 发送</button>
            </div>
        </div>

        <div class="disclaimer">回复由豆包大模型生成，内容仅供参考</div>
    </div>
</div>

<script>
    let knowledgeContent = "";
    const chatBox = document.getElementById('chatBox');
    const questionInput = document.getElementById('question');
    const sendBtn = document.getElementById('sendBtn');
    const fileInput = document.getElementById('fileInput');

    // 1. 上传文件读取逻辑
    fileInput.addEventListener('change', async (e) => {
        const files = e.target.files;
        if (!files.length) return;

        fileList.style.display = "block";
        knowledgeContent = "";

        for (let file of files) {
            fileList.innerHTML += `<div class="file-item">✅ ${file.name}</div>`;
            const text = await file.text();
            // 限制本地知识库内容长度，避免发送过大
            knowledgeContent += `\n=== 文件名：${file.name} ===\n` + text.slice(0, 3000); 
        }
        alert(`已成功加载 ${files.length} 个文件到本地知识库！`);
    });

    // 2. 🔥 核心：优先本地知识库，其次联网回答
    async function askDoubao(question) {
        // 如果没有上传任何内容，直接联网回答
        if (!knowledgeContent) {
            return "🔴 请先上传文档，我将基于文档内容为你回答（当前为模拟回答）";
        }

        try {
            // 构造强制引用知识库的 Prompt
            const systemPrompt = `
                你是万能小爱知识库助手。
                请严格根据我提供给你的【文档内容】进行回答，不要编造任何未知信息。
                文档内容如下：
                \`\`\`
                ${knowledgeContent}
                \`\`\`
                请基于以上内容，用简洁专业的语言回答用户问题。
            `;

            const res = await fetch("https://api.mnapi.top/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "doubao-pro-32k", // 使用豆包专业版
                    messages: [{ role: "user", content: systemPrompt }]
                })
            });

            const data = await res.json();
            // ✅ 成功获取基于文档的回答
            return data.choices[0]?.message?.content || "🟢 已读取文档，但暂无匹配内容";
        } catch (err) {
            // 🟡 联网
