<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库 - 万能小爱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            overflow: hidden;
            background: #f8f9fc;
        }

        .sidebar {
            width: 160px;
            background: #eef2ff;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 999;
        }

        .sidebar-header {
            padding: 16px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1e40af;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .sidebar-logo {
            width: 24px;
            height: 24px;
            background: #1e40af;
            border-radius: 6px;
            display: grid;
            place-items: center;
            color: white;
            font-weight: bold;
        }

        .sidebar-menu {
            flex: 1;
            padding: 8px 0;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            font-size: 14px;
            color: #334155;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            border-radius: 6px;
            border: 2px solid transparent;
        }

        .menu-item:hover {
            background: #dbeafe;
            color: #1e40af;
            font-weight: 500;
            border: 2px solid #1d4ed8;
            box-shadow: 0 0 8px #3b82f6;
        }

        .sidebar-footer {
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .footer-btn {
            padding: 10px;
            font-size: 13px;
            color: #1e40af;
            background: #e0e7ff;
            border: 2px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .footer-btn:hover {
            border: 2px solid #1d4ed8;
            box-shadow: 0 0 8px #3b82f6;
            background: #dbeafe;
            font-weight: 500;
        }

        .login-btn {
            background: #4f46e5;
            color: white;
            padding: 12px;
            font-weight: 500;
            text-align: center;
            white-space: nowrap;
        }

        .main {
            flex: 1;
            margin-left: 160px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: white;
        }

        .top-bar {
            padding: 16px 30px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fafbfc;
        }

        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: #1e40af;
        }

        .tool-bar {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-input {
            padding: 6px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            width: 240px;
        }

        .btn {
            padding: 6px 14px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-primary { background: #1d4ed8; color: white; }
        .btn-success { background: #16a34a; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-light { background: #f1f5f9; color: #334155; }

        .content {
            padding: 30px;
            overflow-y: auto;
            flex: 1;
        }

        .path-nav {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #64748b;
        }

        .path-item {
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .path-item:hover {
            background: #eef2ff;
            color: #1e40af;
        }

        .path-sep { color: #94a3b8; }

        .folder-list {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .folder {
            width: 140px;
            height: 140px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.2s;
            user-select: none;
            position: relative;
        }

        .folder:hover {
            border-color: #1d4ed8;
            background: #dbeafe;
        }

        .folder-icon {
            font-size: 40px;
            color: #f59e0b;
        }

        .folder-actions {
            position: absolute;
            bottom: 6px;
            display: flex;
            gap: 4px;
        }

        .folder-actions button {
            font-size: 11px;
            padding: 3px 6px;
        }

        .file-list {
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }

        .file-item {
            padding: 12px 16px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 6px;
            cursor: grab;
        }

        .file-item:active {
            cursor: grabbing;
        }

        .file-item:hover {
            background: #f8fafc;
        }

        .file-name {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-icon {
            color: #1d4ed8;
            font-size: 18px;
        }

        .file-actions {
            display: flex;
            gap: 6px;
        }

        .file-actions button {
            font-size: 12px;
            padding: 4px 8px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 10px;
            width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .modal-header {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #1e40af;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #666;
        }

        .modal-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            margin-bottom: 18px;
            font-size: 14px;
        }

        .modal-select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            margin-bottom: 18px;
            font-size: 14px;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .preview-img {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 6px;
            margin: 10px 0;
        }

        .preview-text {
            background: #f8fafc;
            padding: 16px;
            border-radius: 6px;
            max-height: 60vh;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.6;
        }

        .preview-none {
            padding: 40px;
            text-align: center;
            color: #666;
        }
    </style>
</head>

<body>

<!-- 左侧栏 -->
<div class="sidebar">
    <div class="sidebar-header" onclick="location.href='index.html'">
        <div class="sidebar-logo">🤖</div>万能小爱
    </div>
    <div class="sidebar-menu">
        <div class="menu-item" onclick="location.href='index.html'">💬 AI提问</div>
        <div class="menu-item" style="background:#dbeafe;color:#1e40af;font-weight:500;">📚 知识库</div>
        <div class="menu-item">📊 PPT生成</div>
    </div>
    <div class="sidebar-footer">
        <button class="footer-btn">⬇️ 下载APP</button>
        <button class="footer-btn">✓ 使用攻略</button>
        <button class="footer-btn login-btn">登录</button>
    </div>
</div>

<!-- 弹窗1：新建/重命名 -->
<div class="modal" id="modal1">
    <div class="modal-content">
        <div class="modal-header">
            <div id="modal1Title">标题</div>
            <button class="close-btn" onclick="closeModal1()">×</button>
        </div>
        <input type="text" class="modal-input" id="modal1Input" placeholder="请输入名称">
        <div class="modal-actions">
            <button class="btn btn-light" onclick="closeModal1()">取消</button>
            <button class="btn btn-primary" onclick="confirmModal1()">确定</button>
        </div>
    </div>
</div>

<!-- 弹窗2：移动文件夹 -->
<div class="modal" id="modal2">
    <div class="modal-content">
        <div class="modal-header">
            <div>移动到</div>
            <button class="close-btn" onclick="closeModal2()">×</button>
        </div>
        <select class="modal-select" id="moveTargetPath"></select>
        <div class="modal-actions">
            <button class="btn btn-light" onclick="closeModal2()">取消</button>
            <button class="btn btn-primary" onclick="confirmMove()">确定移动</button>
        </div>
    </div>
</div>

<!-- 弹窗3：文件预览 -->
<div class="modal" id="previewModal">
    <div class="modal-content">
        <div class="modal-header">
            <div id="previewTitle">文件预览</div>
            <button class="close-btn" onclick="closePreview()">×</button>
        </div>
        <div id="previewBody"></div>
    </div>
</div>

<!-- 右侧主体 -->
<div class="main">
    <div class="top-bar">
        <div class="page-title">📁 知识库管理</div>
        <div class="tool-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="搜索文件/文件夹..." oninput="searchItems()">
            <button class="btn btn-primary" onclick="openCreateFolderModal()">📂 新建文件夹</button>
            <button class="btn btn-success" onclick="document.getElementById('fileUpload').click()">📤 上传文件</button>
            <input type="file" id="fileUpload" multiple style="display:none;">
        </div>
    </div>

    <div class="content">
        <div class="path-nav" id="pathNav"></div>
        <div class="folder-list" id="folderList"></div>
        <div class="file-list" id="fileList"></div>
    </div>
</div>

<script>
    // ========== 核心数据结构 ==========
    let currentPath = '/';
    let pathStack = [{ name: '根目录', path: '/' }];
    let fileSystem = {
        '/': { folders: ['论文资料', '课程笔记', '项目文档'], files: [] },
        '/论文资料': { folders: [], files: [] },
        '/课程笔记': { folders: [], files: [] },
        '/项目文档': { folders: [], files: [] }
    };

    // 临时操作变量
    let modal1Mode = '';
    let modal1Target = '';
    let moveTarget = null;
    let dragFileName = null;
    let uploadedFiles = {}; // 存储真实上传的文件对象

    // DOM
    const modal1 = document.getElementById('modal1');
    const modal2 = document.getElementById('modal2');
    const previewModal = document.getElementById('previewModal');
    const modal1Title = document.getElementById('modal1Title');
    const modal1Input = document.getElementById('modal1Input');
    const moveTargetPath = document.getElementById('moveTargetPath');
    const previewTitle = document.getElementById('previewTitle');
    const previewBody = document.getElementById('previewBody');
    const fileUpload = document.getElementById('fileUpload');
    const folderList = document.getElementById('folderList');
    const fileList = document.getElementById('fileList');
    const pathNav = document.getElementById('pathNav');
    const searchInput = document.getElementById('searchInput');

    window.onload = () => {
        renderCurrentDir();
        fileUpload.onchange = uploadFiles;
        enableDragFileToFolder();
    };

    // ========== 渲染 ==========
    function renderCurrentDir() {
        folderList.innerHTML = '';
        fileList.innerHTML = '';
        renderPathNav();
        const dir = fileSystem[currentPath] || { folders: [], files: [] };

        // 渲染文件夹
        dir.folders.forEach(name => {
            const f = document.createElement('div');
            f.className = 'folder';
            f.setAttribute('data-folder', name);
            f.innerHTML = `
                <div class="folder-icon">📁</div>
                <div style="font-size:13px">${name}</div>
                <div class="folder-actions">
                    <button class="btn btn-light" onclick="openRenameFolderModal('${name}')">重命名</button>
                    <button class="btn btn-warning" onclick="openMoveFolderModal('${name}')">移动</button>
                    <button class="btn btn-danger" onclick="deleteFolder('${name}')">删除</button>
                </div>`;
            f.onclick = (e) => { if(e.target === f || f.querySelector('.folder-icon') === e.target) enterFolder(name); };
            folderList.appendChild(f);
        });

        // 渲染文件
        dir.files.forEach(file => {
            const item = document.createElement('div');
            item.className = 'file-item';
            item.setAttribute('draggable', true);
            item.setAttribute('data-file', file.name);
            item.innerHTML = `
                <div class="file-name">
                    <div class="file-icon">📄</div>
                    <div>${file.name}</div>
                </div>
                <div class="file-actions">
                    <button class="btn btn-primary" onclick="viewFile('${file.name}')">查看</button>
                    <button class="btn btn-light" onclick="downloadFile('${file.name}')">下载</button>
                    <button class="btn btn-warning" onclick="openRenameFileModal('${file.name}')">重命名</button>
                    <button class="btn btn-danger" onclick="deleteFile('${file.name}')">删除</button>
                </div>`;
            fileList.appendChild(item);
        });
    }

    function renderPathNav() {
        pathNav.innerHTML = '';
        pathStack.forEach((item, i) => {
            const d = document.createElement('div');
            d.className = 'path-item';
            d.innerText = item.name;
            d.onclick = () => { currentPath = item.path; pathStack = pathStack.slice(0,i+1); renderCurrentDir(); };
            pathNav.appendChild(d);
            if(i<pathStack.length-1) {
                const s = document.createElement('div');
                s.className = 'path-sep';
                s.innerText = '/';
                pathNav.appendChild(s);
            }
        });
    }

    // ========== 拖拽文件到文件夹 ==========
    function enableDragFileToFolder() {
        document.addEventListener('dragstart', e => {
            if(e.target.classList.contains('file-item')) {
                dragFileName = e.target.getAttribute('data-file');
            }
        });

        document.addEventListener('dragover', e => e.preventDefault());

        document.addEventListener('drop', e => {
            e.preventDefault();
            const folder = e.target.closest('.folder');
            if(!folder || !dragFileName) return;

            const folderName = folder.getAttribute('data-folder');
            const targetPath = currentPath === '/' ? `/${folderName}` : `${currentPath}/${folderName}`;

            const srcDir = fileSystem[currentPath];
            const destDir = fileSystem[targetPath];
            const file = srcDir.files.find(f => f.name === dragFileName);

            if(file && !destDir.files.some(f => f.name === dragFileName)) {
                srcDir.files = srcDir.files.filter(f => f.name !== dragFileName);
                destDir.files.push(file);
                
                // 移动真实文件对象
                if(uploadedFiles[dragFileName]) {
                    uploadedFiles[targetPath + dragFileName] = uploadedFiles[dragFileName];
                    delete uploadedFiles[dragFileName];
                }
                
                renderCurrentDir();
            }
            dragFileName = null;
        });
    }

    // ========== 真实文件预览（图片/文本） ==========
    function viewFile(fileName) {
        const file = uploadedFiles[fileName];
        if(!file) {
            previewTitle.innerText = fileName;
            previewBody.innerHTML = '<div class="preview-none">无法预览：文件未上传或已删除</div>';
            previewModal.style.display = 'flex';
            return;
        }

        previewTitle.innerText = fileName;
        
        // 图片预览
        if(file.type.startsWith('image/')) {
            const url = URL.createObjectURL(file);
            previewBody.innerHTML = `<img src="${url}" class="preview-img">`;
        }
        // 文本预览
        else if(file.type.startsWith('text/') || 
                fileName.endsWith('.txt') || 
                fileName.endsWith('.md') || 
                fileName.endsWith('.json') || 
                fileName.endsWith('.js') || 
                fileName.endsWith('.css') || 
                fileName.endsWith('.html')) {
            const reader = new FileReader();
            reader.onload = e => {
                previewBody.innerHTML = `<div class="preview-text">${e.target.result}</div>`;
            };
            reader.readAsText(file);
        }
        // 不支持预览
        else {
            previewBody.innerHTML = '<div class="preview-none">该文件类型暂不支持预览</div>';
        }
        
        previewModal.style.display = 'flex';
    }

    function closePreview() {
        previewModal.style.display = 'none';
        previewBody.innerHTML = '';
    }

    // ========== 文件夹操作 ==========
    function enterFolder(name) {
        const newPath = currentPath === '/' ? `/${name}` : `${currentPath}/${name}`;
        if(!fileSystem[newPath]) fileSystem[newPath] = { folders:[], files:[] };
        currentPath = newPath;
        pathStack.push({name, path:newPath});
        renderCurrentDir();
    }

    function openCreateFolderModal() {
        modal1Mode = 'createFolder';
        modal1Title.innerText = '新建文件夹';
        modal1Input.value = '';
        modal1.style.display = 'flex';
        modal1Input.focus();
    }

    function openRenameFolderModal(name) {
        modal1Mode = 'renameFolder';
        modal1Target = name;
        modal1Title.innerText = '重命名文件夹';
        modal1Input.value = name;
        modal1.style.display = 'flex';
        modal1Input.focus();
    }

    function openRenameFileModal(name) {
        modal1Mode = 'renameFile';
        modal1Target = name;
        modal1Title.innerText = '重命名文件';
        modal1Input.value = name;
        modal1.style.display = 'flex';
        modal1Input.focus();
    }

    function confirmModal1() {
        const val = modal1Input.value.trim();
        if(!val) { closeModal1(); return; }
        const dir = fileSystem[currentPath];

        if(modal1Mode === 'createFolder') {
            if(!dir.folders.includes(val)) {
                dir.folders.push(val);
                fileSystem[currentPath === '/' ? `/${val}` : `${currentPath}/${val}`] = { folders:[], files:[] };
            }
        } else if(modal1Mode === 'renameFolder') {
            const old = modal1Target;
            if(dir.folders.includes(old) && !dir.folders.includes(val)) {
                dir.folders = dir.folders.map(n => n === old ? val : n);
                const oldPath = currentPath === '/' ? `/${old}` : `${currentPath}/${old}`;
                const newPath = currentPath === '/' ? `/${val}` : `${currentPath}/${val}`;
                fileSystem[newPath] = fileSystem[oldPath];
                delete fileSystem[oldPath];
            }
        } else if(modal1Mode === 'renameFile') {
            const old = modal1Target;
            dir.files = dir.files.map(f => f.name === old ? {name:val} : f);
            
            // 重命名真实文件对象
            if(uploadedFiles[old]) {
                uploadedFiles[val] = uploadedFiles[old];
                delete uploadedFiles[old];
            }
        }
        renderCurrentDir();
        closeModal1();
    }

    function closeModal1() { modal1.style.display = 'none'; }
    function closeModal2() { modal2.style.display = 'none'; }

    // ========== 删除 ==========
    function deleteFolder(name) {
        if(!confirm(`确定删除文件夹【${name}】及里面所有内容？`)) return;
        const dir = fileSystem[currentPath];
        dir.folders = dir.folders.filter(n => n !== name);
        const delPath = currentPath === '/' ? `/${name}` : `${currentPath}/${name}`;
        
        // 删除文件夹内所有文件
        deleteAllFilesInPath(delPath);
        delete fileSystem[delPath];
        renderCurrentDir();
    }

    function deleteFile(name) {
        if(!confirm(`确定删除文件【${name}】？`)) return;
        fileSystem[currentPath].files = fileSystem[currentPath].files.filter(f => f.name !== name);
        delete uploadedFiles[name];
        renderCurrentDir();
    }

    function deleteAllFilesInPath(path) {
        const dir = fileSystem[path];
        if(!dir) return;
        dir.files.forEach(f => delete uploadedFiles[f.name]);
        dir.folders.forEach(subFolder => {
            deleteAllFilesInPath(path === '/' ? `/${subFolder}` : `${path}/${subFolder}`);
        });
    }

    // ========== 上传 ==========
    function uploadFiles() {
        const files = fileUpload.files;
        if(!files.length) return;
        const dir = fileSystem[currentPath];
        
        for(let f of files) {
            if(!dir.files.some(exist => exist.name === f.name)) {
                dir.files.push({ name: f.name });
                uploadedFiles[f.name] = f;
            }
        }
        
        renderCurrentDir();
        fileUpload.value = '';
    }

    // ========== 下载 ==========
    function downloadFile(fileName) {
        const file = uploadedFiles[fileName];
        if(!file) {
            alert('文件不存在');
            return;
        }
        const url = URL.createObjectURL(file);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        a.click();
        URL.revokeObjectURL(url);
    }

    // ========== 移动 ==========
    function openMoveFolderModal(name) {
        moveTarget = {type:'folder', name};
        openMoveModal();
    }

    function openMoveModal() {
        moveTargetPath.innerHTML = '';
        Object.keys(fileSystem).forEach(path => {
            if(path === currentPath) return;
            const opt = document.createElement('option');
            opt.value = path;
            opt.innerText = path === '/' ? '根目录' : path.split('/').pop();
            moveTargetPath.appendChild(opt);
        });
        modal2.style.display = 'flex';
    }

    function confirmMove() {
        const targetPath = moveTargetPath.value;
        const srcDir = fileSystem[currentPath];
        const destDir = fileSystem[targetPath];
        const name = moveTarget.name;

        if(moveTarget.type === 'folder') {
            if(srcDir.folders.includes(name) && !destDir.folders.includes(name)) {
                srcDir.folders = srcDir.folders.filter(n => n !== name);
                destDir.folders.push(name);
            }
        }
        renderCurrentDir();
        closeModal2();
    }

    // ========== 搜索 ==========
    function searchItems() {
        const key = searchInput.value.toLowerCase();
        document.querySelectorAll('.folder,.file-item').forEach(el => {
            el.style.display = el.innerText.toLowerCase().includes(key) ? '' : 'none';
        });
    }

    // 点击空白关闭弹窗
    modal1.onclick = e => e.target === modal1 && closeModal1();
    modal2.onclick = e => e.target === modal2 && closeModal2();
    previewModal.onclick = e => e.target === previewModal && closePreview();
    modal1Input.onkeydown = e => e.key === 'Enter' && confirmModal1();
</script>
