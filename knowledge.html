<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库 - 万能小爱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            overflow: hidden;
            background: #f8f9fc;
        }

        .sidebar {
            width: 160px;
            background: #eef2ff;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 999;
        }

        .sidebar-header {
            padding: 16px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1e40af;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .sidebar-logo {
            width: 24px;
            height: 24px;
            background: #1e40af;
            border-radius: 6px;
            display: grid;
            place-items: center;
            color: white;
            font-weight: bold;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            font-size: 14px;
            color: #334155;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            border-radius: 6px;
            border: 2px solid transparent;
        }

        .menu-item:hover {
            background: #dbeafe;
            color: #1e40af;
            font-weight: 500;
        }

        .main {
            flex: 1;
            margin-left: 160px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: white;
        }

        .top-bar {
            padding: 16px 30px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fafbfc;
        }

        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: #1e40af;
        }

        .tool-bar {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-input {
            padding: 6px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            width: 240px;
        }

        .btn {
            padding: 6px 14px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-primary { background: #1d4ed8; color: white; }
        .btn-success { background: #16a34a; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-light { background: #f1f5f9; color: #334155; }

        .content {
            padding: 20px 30px;
            overflow-y: auto;
            flex: 1;
        }

        .path-nav {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 16px;
            font-size: 14px;
            color: #64748b;
        }

        .path-item {
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .path-item:hover {
            background: #eef2ff;
            color: #1e40af;
        }

        /* 表格头部 */
        .list-header {
            display: grid;
            grid-template-columns: 1fr 180px 120px 160px;
            padding: 10px 16px;
            font-weight: 500;
            color: #374151;
            background: #f3f4f6;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 14px;
        }

        /* 统一列表行 */
        .item-row {
            display: grid;
            grid-template-columns: 1fr 180px 120px 160px;
            align-items: center;
            padding: 12px 16px;
            border-radius: 6px;
            cursor: pointer;
            user-select: none;
            font-size: 14px;
        }

        .item-row:hover {
            background: #f9fafb;
        }

        .item-name {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .icon-folder { color: #f59e0b; font-size: 16px; }
        .icon-file { color: #1d4ed8; font-size: 16px; }

        .item-date { color: #6b7280; font-size: 13px; }
        .item-type { color: #4b5563; font-size: 13px; }

        .item-actions {
            display: flex;
            gap: 6px;
        }

        .item-actions button {
            font-size: 12px;
            padding: 4px 8px;
        }

        /* 拖拽样式 */
        .drag-over {
            background: #dbeafe !important;
            border: 2px dashed #1d4ed8;
        }

        /* 弹窗 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 10px;
            width: 700px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #1e40af;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }

        .modal-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            margin-bottom: 18px;
        }

        .preview-img { max-width: 100%; border-radius: 6px; }
        .preview-text { background: #f9fafb; padding: 16px; border-radius: 6px; white-space: pre-wrap; line-height: 1.6; }
        .preview-none { padding: 40px; text-align: center; color: #666; }
    </style>
</head>

<body>

<!-- 左侧 -->
<div class="sidebar">
    <div class="sidebar-header" onclick="location.href='index.html'">
        <div class="sidebar-logo">🤖</div>万能小爱
    </div>
    <div class="menu-item" onclick="location.href='index.html'">💬 AI提问</div>
    <div class="menu-item" style="background:#dbeafe;color:#1e40af;font-weight:500;">📚 知识库</div>
    <div class="menu-item">📊 PPT生成</div>
</div>

<!-- 重命名弹窗 -->
<div class="modal" id="modal">
    <div class="modal-content">
        <div class="modal-header">
            <div id="modalTitle">标题</div>
            <button class="close-btn" onclick="closeModal()">×</button>
        </div>
        <input type="text" class="modal-input" id="modalInput" placeholder="请输入名称">
        <div style="display:flex;justify-content:flex-end;gap:10px;">
            <button class="btn btn-light" onclick="closeModal()">取消</button>
            <button class="btn btn-primary" onclick="confirmModal()">确定</button>
        </div>
    </div>
</div>

<!-- 预览弹窗 -->
<div class="modal" id="previewModal">
    <div class="modal-content">
        <div class="modal-header">
            <div id="previewTitle">文件预览</div>
            <button class="close-btn" onclick="closePreview()">×</button>
        </div>
        <div id="previewBody"></div>
    </div>
</div>

<!-- 主体 -->
<div class="main">
    <div class="top-bar">
        <div class="page-title">📁 知识库管理</div>
        <div class="tool-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="搜索文件/文件夹..." oninput="searchItems()">
            <button class="btn btn-primary" onclick="createFolder()">📂 新建文件夹</button>
            <button class="btn btn-success" onclick="document.getElementById('fileUpload').click()">📤 上传文件</button>
            <input type="file" id="fileUpload" multiple style="display:none;">
        </div>
    </div>

    <div class="content">
        <div class="path-nav" id="pathNav"></div>
        <div class="list-header">
            <div>名称</div>
            <div>日期</div>
            <div>类型</div>
            <div>操作</div>
        </div>
        <div id="listContainer"></div>
    </div>
</div>

<script>
// ================= 核心数据 =================
let currentPath = '/';
let pathStack = [{ name: '根目录', path: '/' }];

let fileSystem = {
    '/': { folders: [], files: [] }
};

let meta = {}; // 存储创建/更新时间
let uploadedFiles = {};
let modalMode = '', targetName = '';
let dragItem = null;

const dom = {
    modal: document.getElementById('modal'),
    modalTitle: document.getElementById('modalTitle'),
    modalInput: document.getElementById('modalInput'),
    previewModal: document.getElementById('previewModal'),
    previewTitle: document.getElementById('previewTitle'),
    previewBody: document.getElementById('previewBody'),
    fileUpload: document.getElementById('fileUpload'),
    listContainer: document.getElementById('listContainer'),
    pathNav: document.getElementById('pathNav'),
    searchInput: document.getElementById('searchInput')
};

window.onload = () => {
    render();
    dom.fileUpload.onchange = uploadFiles;
    initDrag();
};

// ================= 渲染 =================
function render() {
    dom.listContainer.innerHTML = '';
    renderPath();
    const dir = fileSystem[currentPath] || { folders: [], files: [] };

    // 文件夹
    dir.folders.forEach(name => {
        const key = currentPath + name;
        const d = meta[key] || { create: new Date().toLocaleString(), update: new Date().toLocaleString() };
        const el = row({
            name, icon: '📁', date: d.update, type: '文件夹',
            btns: `
                <button class="btn btn-light" onclick="rename('folder','${name}')">重命名</button>
                <button class="btn btn-danger" onclick="del('folder','${name}')">删除</button>
            `
        });
        el.setAttribute('data-type', 'folder');
        el.setAttribute('data-name', name);
        el.onclick = (e) => { if (!e.target.closest('button')) enter(name); };
        dom.listContainer.appendChild(el);
    });

    // 文件
    dir.files.forEach(file => {
        const name = file.name;
        const key = currentPath + name;
        const d = meta[key] || { create: new Date().toLocaleString(), update: new Date().toLocaleString() };
        const el = row({
            name, icon: '📄', date: d.update, type: getType(name),
            btns: `
                <button class="btn btn-primary" onclick="view('${name}')">查看</button>
                <button class="btn btn-light" onclick="download('${name}')">下载</button>
                <button class="btn btn-light" onclick="rename('file','${name}')">重命名</button>
                <button class="btn btn-danger" onclick="del('file','${name}')">删除</button>
            `
        });
        el.setAttribute('data-type', 'file');
        el.setAttribute('data-name', name);
        dom.listContainer.appendChild(el);
    });
}

function row({ name, icon, date, type, btns }) {
    const div = document.createElement('div');
    div.className = 'item-row';
    div.innerHTML = `
        <div class="item-name"><span>${icon}</span> ${name}</div>
        <div class="item-date">${date}</div>
        <div class="item-type">${type}</div>
        <div class="item-actions">${btns}</div>
    `;
    return div;
}

function renderPath() {
    dom.pathNav.innerHTML = '';
    pathStack.forEach((item, i) => {
        const a = document.createElement('span');
        a.className = 'path-item';
        a.innerText = item.name;
        a.onclick = () => { currentPath = item.path; pathStack = pathStack.slice(0, i + 1); render(); };
        dom.pathNav.appendChild(a);
        if (i < pathStack.length - 1) {
            const s = document.createElement('span');
            s.style.margin = '0 4px';
            s.innerText = '/';
            dom.pathNav.appendChild(s);
        }
    });
}

// ================= 文件类型 =================
function getType(name) {
    const ext = name.split('.').pop().toLowerCase();
    const map = {
        img: ['png', 'jpg', 'jpeg', 'gif', 'bmp', 'webp'],
        text: ['txt', 'md', 'json', 'js', 'css', 'html', 'log'],
        pdf: ['pdf'],
        word: ['doc', 'docx'],
        excel: ['xls', 'xlsx', 'csv'],
        ppt: ['ppt', 'pptx'],
        video: ['mp4', 'mov', 'avi', 'mkv'],
        audio: ['mp3', 'wav', 'flac']
    };
    if (map.img.includes(ext)) return '图片';
    if (map.text.includes(ext)) return '文本';
    if (map.pdf.includes(ext)) return 'PDF';
    if (map.word.includes(ext)) return 'Word';
    if (map.excel.includes(ext)) return 'Excel';
    if (map.ppt.includes(ext)) return 'PPT';
    if (map.video.includes(ext)) return '视频';
    if (map.audio.includes(ext)) return '音频';
    return '文件';
}

// ================= 拖拽 =================
function initDrag() {
    document.addEventListener('dragstart', e => {
        const row = e.target.closest('.item-row');
        if (!row) return;
        dragItem = {
            type: row.getAttribute('data-type'),
            name: row.getAttribute('data-name')
        };
        e.dataTransfer.effectAllowed = 'move';
    });

    document.addEventListener('dragover', e => e.preventDefault());

    document.addEventListener('drop', e => {
        e.preventDefault();
        const target = e.target.closest('.item-row');
        if (!target || !dragItem) return;

        const targetType = target.getAttribute('data-type');
        const targetName = target.getAttribute('data-name');
        if (targetType !== 'folder') return;

        const srcDir = fileSystem[currentPath];
        const dstPath = currentPath === '/' ? `/${targetName}` : `${currentPath}/${targetName}`;
        const dstDir = fileSystem[dstPath] || (fileSystem[dstPath] = { folders: [], files: [] });

        if (dragItem.type === 'folder') {
            if (srcDir.folders.includes(dragItem.name)) {
                srcDir.folders = srcDir.folders.filter(n => n !== dragItem.name);
                if (!dstDir.folders.includes(dragItem.name)) dstDir.folders.push(dragItem.name);
            }
        } else {
            const f = srcDir.files.find(x => x.name === dragItem.name);
            if (f && !dstDir.files.some(x => x.name === dragItem.name)) {
                srcDir.files = srcDir.files.filter(x => x.name !== dragItem.name);
                dstDir.files.push(f);
                if (uploadedFiles[dragItem.name]) {
                    uploadedFiles[dstPath + dragItem.name] = uploadedFiles[dragItem.name];
                    delete uploadedFiles[dragItem.name];
                }
            }
        }
        render();
        dragItem = null;
    });
}

// ================= 查看 / 下载 =================
function view(name) {
    const f = uploadedFiles[name];
    if (!f) { dom.previewBody.innerHTML = '<div class="preview-none">文件不存在</div>'; dom.previewModal.style.display = 'flex'; return; }
    dom.previewTitle.innerText = name;
    if (f.type.startsWith('image/')) {
        dom.previewBody.innerHTML = `<img src="${URL.createObjectURL(f)}" class="preview-img">`;
    } else if (f.type.startsWith('text/') || /\.(txt|md|json|js|css|html)$/.test(name)) {
        new FileReader().onload = e => dom.previewBody.innerHTML = `<div class="preview-text">${e.target.result}</div>`;
        reader.readAsText(f);
    } else {
        dom.previewBody.innerHTML = '<div class="preview-none">暂不支持预览</div>';
    }
    dom.previewModal.style.display = 'flex';
}

function closePreview() { dom.previewModal.style.display = 'none'; dom.previewBody.innerHTML = ''; }

function download(name) {
    const f = uploadedFiles[name];
    if (!f) return alert('文件不存在');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(f);
    a.download = name;
    a.click();
}

// ================= 新建 / 重命名 / 删除 =================
function createFolder() {
    modalMode = 'createFolder';
    dom.modalTitle.innerText = '新建文件夹';
    dom.modalInput.value = '';
    dom.modal.style.display = 'flex';
}

function rename(type, name) {
    modalMode = type === 'folder' ? 'renameFolder' : 'renameFile';
    targetName = name;
    dom.modalTitle.innerText = '重命名';
    dom.modalInput.value = name;
    dom.modal.style.display = 'flex';
}

function confirmModal() {
    const val = dom.modalInput.value.trim();
    if (!val) return closeModal();
    const dir = fileSystem[currentPath];
    const now = new Date().toLocaleString();

    if (modalMode === 'createFolder') {
        if (!dir.folders.includes(val)) {
            dir.folders.push(val);
            meta[currentPath + val] = { create: now, update: now };
        }
    } else if (modalMode === 'renameFolder') {
        if (dir.folders.includes(targetName) && !dir.folders.includes(val)) {
            dir.folders = dir.folders.map(n => n === targetName ? val : n);
            meta[currentPath + val] = { create: meta[currentPath + targetName]?.create || now, update: now };
            delete meta[currentPath + targetName];
        }
    } else if (modalMode === 'renameFile') {
        dir.files = dir.files.map(f => f.name === targetName ? { name: val } : f);
        if (uploadedFiles[targetName]) {
            uploadedFiles[val] = uploadedFiles[targetName];
            delete uploadedFiles[targetName];
        }
        meta[currentPath + val] = { create: meta[currentPath + targetName]?.create || now, update: now };
        delete meta[currentPath + targetName];
    }
    render();
    closeModal();
}

function del(type, name) {
    if (!confirm(`确定删除【${name}】？`)) return;
    const dir = fileSystem[currentPath];
    if (type === 'folder') {
        dir.folders = dir.folders.filter(n => n !== name);
        deleteDeep(currentPath + name);
    } else {
        dir.files = dir.files.filter(f => f.name !== name);
        delete uploadedFiles[name];
        delete meta[currentPath + name];
    }
    render();
}

function deleteDeep(path) {
    const d = fileSystem[path];
    if (!d) return;
    d.files.forEach(f => { delete uploadedFiles[f.name]; delete meta[path + f.name]; });
    d.folders.forEach(sub => deleteDeep(path + '/' + sub));
    delete fileSystem[path];
}

function closeModal() { dom.modal.style.display = 'none'; }

// ================= 进入文件夹 =================
function enter(name) {
    const newPath = currentPath === '/' ? `/${name}` : `${currentPath}/${name}`;
    if (!fileSystem[newPath]) fileSystem[newPath] = { folders: [], files: [] };
    currentPath = newPath;
    pathStack.push({ name, path: newPath });
    render();
}

// ================= 上传 =================
function uploadFiles() {
    const files = dom.fileUpload.files;
    const dir = fileSystem[currentPath];
    const now = new Date().toLocaleString();
    for (let f of files) {
        if (!dir.files.some(x => x.name === f.name)) {
            dir.files.push({ name: f.name });
            uploadedFiles[f.name] = f;
            meta[currentPath + f.name] = { create: now, update: now };
        }
    }
    render();
    dom.fileUpload.value = '';
}

// ================= 搜索 =================
function searchItems() {
    const key = dom.searchInput.value.toLowerCase();
    document.querySelectorAll('.item-row').forEach(el => {
        el.style.display = el.innerText.toLowerCase().includes(key) ? 'grid' : 'none';
    });
}
</script>
</body>
</html>
