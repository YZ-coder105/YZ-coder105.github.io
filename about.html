<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识无界</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            overflow: hidden;
            background: #FCFCFD;
        }

        /* —— 左侧边栏 美化 —— */
        .sidebar {
            width: 260px;
            background: #ffffff;
            border-right: 1px solid #E5E7EB;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 12px rgba(0,0,0,0.03);
        }

        .logo {
            padding: 28px 24px;
            font-size: 20px;
            font-weight: 700;
            color: #165DFF;
            letter-spacing: 0.5px;
        }

        .menu {
            flex: 1;
            padding: 12px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            border-radius: 10px;
            font-size: 15px;
            color: #4B5563;
            cursor: pointer;
            margin-bottom: 6px;
            transition: all 0.2s ease;
        }

        .menu-item.active {
            background: #EFF6FF;
            color: #165DFF;
            font-weight: 600;
        }

        .menu-item:hover {
            background: #F3F4F6;
            transform: translateX(2px);
        }

        /* —— 主内容区 美化 —— */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 20px 28px;
            border-bottom: 1px solid #E5E7EB;
            font-size: 19px;
            font-weight: 600;
            color: #111827;
            background: #fff;
        }

        .content {
            flex: 1;
            padding: 28px;
            overflow-y: auto;
            background: #FCFCFD;
        }

        /* —— 对话区域 美化 —— */
        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .message-bubble {
            padding: 16px 20px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.65;
            max-width: 82%;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-msg {
            background: #165DFF;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 6px;
        }

        .ai-msg {
            background: #ffffff;
            border: 1px solid #F3F4F6;
            color: #1F2937;
            align-self: flex-start;
            border-bottom-left-radius: 6px;
        }

        /* —— 底部输入框 美化 —— */
        .input-footer {
            border-top: 1px solid #E5E7EB;
            padding: 20px 24px;
            background: #fff;
        }

        .input-box {
            max-width: 800px;
            margin: 0 auto;
            border: 1px solid #E5E7EB;
            border-radius: 20px;
            padding: 14px 18px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
            background: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: border 0.2s;
        }

        .input-box:focus-within {
            border-color: #A5C8FF;
            box-shadow: 0 0 0 3px rgba(22, 93, 255, 0.1);
        }

        textarea {
            flex: 1;
            border: none;
            outline: none;
            resize: none;
            font-size: 15px;
            min-height: 24px;
            max-height: 120px;
            line-height: 1.5;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .icon-btn {
            width: 34px;
            height: 34px;
            display: grid;
            place-items: center;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
        }

        .icon-btn:hover {
            background: #F3F4F6;
        }

        .send-btn {
            background: #165DFF;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 10px 16px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: #0F4BD1;
        }

        /* 知识库上传 美化 */
        .upload-area {
            border: 1px dashed #D1D5DB;
            border-radius: 16px;
            padding: 36px 20px;
            text-align: center;
            margin-top: 24px;
            background: #fff;
            transition: border 0.2s;
        }

        .upload-area:hover {
            border-color: #165DFF;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #D1D5DB;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="logo">小问 AI</div>
        <div class="menu">
            <div class="menu-item active" onclick="showPage('chat')">💬 AI 问答</div>
            <div class="menu-item" onclick="showPage('knowledge')">📚 知识库</div>
            <div class="menu-item" onclick="showPage('search')">🔍 AI 搜索</div>
            <div class="menu-item" onclick="location.href='index.html'">🏠 返回首页</div>
        </div>
    </div>

    <div class="main">
        <div class="header">AI 智能问答</div>
        <div class="content">
            <div id="page-chat" class="chat-container">
                <div class="ai-msg message-bubble">你好！我是你的 AI 助手，有什么可以帮你？</div>
            </div>

            <div id="page-knowledge" style="display:none; max-width:800px; margin:0 auto;">
                <h3 style="font-size:18px; font-weight:600;">📚 本地知识库</h3>
                <div class="upload-area">
                    <p style="color:#6B7280;">支持上传 PDF / Word / TXT / 图片</p>
                    <input type="file" id="fileUpload" multiple style="margin-top:16px;">
                    <button onclick="uploadFiles()" style="margin-left:10px; padding:8px 14px; background:#165DFF; color:white; border:none; border-radius:8px; cursor:pointer;">上传文件</button>
                    <div id="fileList" style="margin-top:18px; text-align:left; color:#374151;"></div>
                </div>
            </div>

            <div id="page-search" style="display:none; max-width:800px; margin:0 auto;">
                <h3 style="font-size:18px; font-weight:600;">🔍 AI 全网搜索</h3>
                <p style="margin-top:12px; color:#6B7280;">输入问题，AI 将联网搜索并整理答案</p>
            </div>
        </div>

        <div class="input-footer">
            <div class="input-box">
                <textarea id="msgInput" placeholder="输入问题，支持联网搜索 + 知识库检索..."></textarea>
                <div class="toolbar">
                    <div class="icon-btn">📎</div>
                    <div class="icon-btn">🖼️</div>
                    <button class="send-btn" onclick="sendMessage()">发送</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showPage(page) {
            document.getElementById("page-chat").style.display = "none";
            document.getElementById("page-knowledge").style.display = "none";
            document.getElementById("page-search").style.display = "none";
            document.getElementById("page-" + page).style.display = page === "chat" ? "flex" : "block";
        }

        function sendMessage() {
            let input = document.getElementById("msgInput");
            let text = input.value.trim();
            if (!text) return;

            let chat = document.getElementById("page-chat");
            chat.innerHTML += `<div class="user-msg message-bubble">${text}</div>`;
            input.value = "";

            setTimeout(() => {
                chat.innerHTML += `<div class="ai-msg message-bubble">AI 思考中...<br><br>已联网搜索 / 检索知识库</div>`;
                chat.scrollTop = chat.scrollHeight;
            }, 600);
        }

        function uploadFiles() {
            let files = document.getElementById("fileUpload").files;
            let list = document.getElementById("fileList");
            list.innerHTML = "";
            for (let f of files) {
                list.innerHTML += `<div>✅ ${f.name}</div>`;
            }
            alert("文件已上传至知识库，AI 可直接调用！");
        }
    </script>
</body>
</html>
