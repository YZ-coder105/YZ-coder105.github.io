<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI驱动，知识无界</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            overflow: hidden;
            background: #fff;
        }

        /* —— 左侧边栏 —— */
        .sidebar {
            width: 240px;
            background: #F7F8FA;
            border-right: 1px solid #E5E7EB;
            display: flex;
            flex-direction: column;
        }

        .logo {
            padding: 24px;
            font-size: 18px;
            font-weight: bold;
            color: #165DFF;
        }

        .menu {
            flex: 1;
            padding: 10px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 15px;
            color: #374151;
            cursor: pointer;
            margin-bottom: 4px;
        }

        .menu-item.active {
            background: #EAF2FF;
            color: #165DFF;
            font-weight: 500;
        }

        .menu-item:hover {
            background: #EEF4FF;
        }

        /* —— 主内容区 —— */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 16px 24px;
            border-bottom: 1px solid #E5E7EB;
            font-size: 18px;
            font-weight: 500;
            color: #111827;
        }

        .content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            background: #fff;
        }

        /* —— 对话区域 —— */
        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message-bubble {
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 15px;
            line-height: 1.6;
            max-width: 85%;
        }

        .user-msg {
            background: #165DFF;
            color: white;
            align-self: flex-end;
        }

        .ai-msg {
            background: #F4F5F7;
            color: #111827;
            align-self: flex-start;
        }

        /* —— 底部输入框 —— */
        .input-footer {
            border-top: 1px solid #E5E7EB;
            padding: 16px 24px;
        }

        .input-box {
            max-width: 800px;
            margin: 0 auto;
            border: 1px solid #D1D5DB;
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
        }

        textarea {
            flex: 1;
            border: none;
            outline: none;
            resize: none;
            font-size: 15px;
            min-height: 24px;
            max-height: 120px;
        }

        .toolbar {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 32px;
            height: 32px;
            display: grid;
            place-items: center;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        .send-btn {
            background: #165DFF;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 14px;
        }

        /* 知识库上传 */
        .upload-area {
            border: 1px dashed #D1D5DB;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <!-- 左侧栏 -->
    <div class="sidebar">
        <div class="logo">小问 AI</div>
        <div class="menu">
            <div class="menu-item active" onclick="showPage('chat')">💬 AI 问答</div>
            <div class="menu-item" onclick="showPage('knowledge')">📚 知识库</div>
            <div class="menu-item" onclick="showPage('search')">🔍 AI 搜索</div>
            <div class="menu-item" onclick="location.href='index.html'">🏠 返回首页</div>
        </div>
    </div>

    <!-- 主内容 -->
    <div class="main">
        <div class="header">AI 智能问答</div>
        <div class="content">

            <!-- AI 问答页面 -->
            <div id="page-chat" class="chat-container">
                <div class="ai-msg message-bubble">你好！我是你的 AI 助手，有什么可以帮你？</div>
            </div>

            <!-- 知识库页面 -->
            <div id="page-knowledge" style="display:none; max-width:800px; margin:0 auto;">
                <h3>📚 本地知识库</h3>
                <div class="upload-area">
                    <p>支持上传 PDF / Word / TXT / 图片</p>
                    <input type="file" id="fileUpload" multiple style="margin-top:14px;">
                    <button onclick="uploadFiles()" style="margin-left:10px; padding:6px 12px; background:#165DFF; color:white; border:none; border-radius:6px;">上传</button>
                    <div id="fileList" style="margin-top:14px; text-align:left;"></div>
                </div>
            </div>

            <!-- AI 搜索页面 -->
            <div id="page-search" style="display:none; max-width:800px; margin:0 auto;">
                <h3>🔍 AI 全网搜索</h3>
                <p style="margin-top:10px;">输入问题，AI 将联网搜索并回答</p>
            </div>

        </div>

        <!-- 底部输入 -->
        <div class="input-footer">
            <div class="input-box">
                <textarea id="msgInput" placeholder="输入问题，支持联网搜索 + 知识库检索..."></textarea>
                <div class="toolbar">
                    <div class="icon-btn">📎</div>
                    <div class="icon-btn">🖼️</div>
                    <button class="send-btn" onclick="sendMessage()">发送</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 页面切换
        function showPage(page) {
            document.getElementById("page-chat").style.display = "none";
            document.getElementById("page-knowledge").style.display = "none";
            document.getElementById("page-search").style.display = "none";
            document.getElementById("page-" + page).style.display = page === "chat" ? "flex" : "block";
        }

        // 发送消息
        function sendMessage() {
            let input = document.getElementById("msgInput");
            let text = input.value.trim();
            if (!text) return;

            let chat = document.getElementById("page-chat");
            chat.innerHTML += `<div class="user-msg message-bubble">${text}</div>`;
            input.value = "";

            setTimeout(() => {
                chat.innerHTML += `<div class="ai-msg message-bubble">AI 思考中...<br><br>已联网搜索 / 检索知识库</div>`;
                chat.scrollTop = chat.scrollHeight;
            }, 600);
        }

        // 上传知识库文件
        function uploadFiles() {
            let files = document.getElementById("fileUpload").files;
            let list = document.getElementById("fileList");
            list.innerHTML = "";
            for (let f of files) {
                list.innerHTML += `<div>✅ ${f.name}</div>`;
            }
            alert("文件已上传至知识库，AI 可直接调用！");
        }
    </script>

</body>
</html>
