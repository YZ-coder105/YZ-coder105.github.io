<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的多功能主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            min-height: 100vh;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background 1s ease;
            color: white;
            text-align: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.45);
            padding: 50px 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .desc {
            font-size: 18px;
            margin-bottom: 40px;
            color: #eee;
        }

        /* 搜索框 */
        .search-box {
            width: 100%;
            max-width: 650px;
            margin: 0 auto 40px;
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            padding: 16px 20px;
            border-radius: 12px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        .search-box button {
            padding: 16px 24px;
            background: #4a6cf7;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
        }

        /* 功能按钮组 */
        .func-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .func-btn {
            padding: 25px 20px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 18px;
            font-weight: bold;
        }

        .func-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
        }

        /* 返回按钮 */
        .back {
            margin-top: 50px;
            display: inline-block;
            padding: 14px 30px;
            background: #ffffff33;
            color: white;
            border-radius: 12px;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🌍 我的多功能主页</h1>
        <p class="desc">随机风景背景 + 搜索 + AI 问答 + PPT 生成</p>

        <!-- 搜索框 -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="输入关键词搜索...">
            <button onclick="doSearch()">搜索</button>
        </div>

        <!-- 功能区 -->
        <div class="func-group">
            <div class="func-btn" onclick="aiChat()">💬 AI 问答</div>
            <div class="func-btn" onclick="genPPT()">📊 PPT 生成</div>
            <div class="func-btn" onclick="changeBg()">🔄 换背景</div>
        </div>

        <a href="index.html" class="back">← 返回首页</a>
    </div>

    <script>
        // ======================================
        // 1. 随机自然风景背景（自动加载）
        // ======================================
        const natureBg = [
            "https://picsum.photos/id/10/1920/1080",
            "https://picsum.photos/id/11/1920/1080",
            "https://picsum.photos/id/12/1920/1080",
            "https://picsum.photos/id/13/1920/1080",
            "https://picsum.photos/id/14/1920/1080",
            "https://picsum.photos/id/15/1920/1080",
            "https://picsum.photos/id/16/1920/1080",
            "https://picsum.photos/id/17/1920/1080"
        ];

        function changeBg() {
            let random = natureBg[Math.floor(Math.random() * natureBg.length)];
            document.body.style.backgroundImage = `url(${random})`;
        }

        // 进入页面自动加载随机背景
        window.onload = changeBg;

        // ======================================
        // 2. 搜索功能（百度搜索接口）
        // ======================================
        function doSearch() {
            let keyword = document.getElementById("searchInput").value.trim();
            if (!keyword) {
                alert("请输入搜索内容");
                return;
            }
            window.open(`https://www.baidu.com/s?wd=${keyword}`, "_blank");
        }

        // ======================================
        // 3. AI 问答（跳转到免费 AI 对话）
        // ======================================
        function aiChat() {
            window.open("https://yiyan.baidu.com/", "_blank");
        }

        // ======================================
        // 4. PPT 生成（跳转到在线 PPT 工具）
        // ======================================
        function genPPT() {
            window.open("https://www.wps.cn/ppt/", "_blank");
        }
    </script>
</body>
</html>
