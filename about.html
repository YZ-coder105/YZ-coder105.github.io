<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小问AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            overflow: hidden;
            background: #fff;
        }

        /* 左侧边栏 —— 浅蓝色 */
        .sidebar {
            width: 180px;
            background: #e8f0fe;
            border-right: 1px solid #d3e3fd;
            display: flex;
            flex-direction: column;
        }

        .sidebar-logo {
            padding: 22px 16px;
            font-size: 22px;
            font-weight: 600;
            color: #165dff;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            font-size: 15px;
            color: #333;
            cursor: pointer;
            transition: all 0.2s;
        }

        .menu-item.active {
            background: #d3e3fd;
            color: #165dff;
            border-radius: 0 8px 8px 0;
        }

        .menu-item:hover {
            background: #d3e3fd;
        }

        /* 右侧主内容 —— 上下左右居中 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fff;
            padding: 20px;
        }

        /* 聊天容器 */
        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 50px;
        }

        /* 消息气泡 */
        .bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        .bubble-ai {
            align-self: flex-start;
            background: #f4f5f7;
            color: #333;
        }

        .bubble-user {
            align-self: flex-end;
            background: #165dff;
            color: #fff;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ======================
           搜索框：超大尺寸 + 圆角 + 加粗边框
        ====================== */
        .input-wrapper {
            width: 85%;         /* 大幅放大 → 更协调 */
            height: 80px;       /* 更高更大气 */
            border: 2px solid #d1d5db;
            border-radius: 20px;/* 圆角更美观 */
            padding: 0 30px;
            display: flex;
            align-items: center;
            gap: 18px;
            margin-top: 0;
        }

        .input-wrapper textarea {
            flex: 1;
            border: none;
            outline: none;
            resize: none;
            font-size: 16px;
            height: 100%;
        }

        .tool-icon {
            font-size: 22px;
            color: #666;
            cursor: pointer;
        }

        .send-btn {
            background: #165dff;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 14px 28px;
            cursor: pointer;
            font-size: 15px;
        }

        /* 页面切换 */
        .page { display: none; }
        .page.active { display: flex; }
    </style>
</head>

<body>

<!-- 左侧栏 -->
<div class="sidebar">
    <div class="sidebar-logo">小问AI</div>
    
    <!-- 返回首页 放在第一个 -->
    <div class="menu-item" onclick="location.href='index.html'">🏠 返回首页</div>
    <div class="menu-item active" onclick="switchPage('chat')">💬 AI 问答</div>
    <div class="menu-item" onclick="switchPage('knowledge')">📚 知识库</div>
    <div class="menu-item" onclick="switchPage('search')">🔍 AI 搜索</div>
</div>

<!-- 右侧内容（整体居中） -->
<div class="main">
    <div id="chatPage" class="page active">
        <div class="chat-container">
            <div id="chatBox"></div>

            <!-- 提示文字放入搜索框内 -->
            <div class="input-wrapper">
                <textarea id="inputText" placeholder="你好！我是你的AI助手，有什么可以帮你？"></textarea>
                <div class="tool-icon">📎</div>
                <div class="tool-icon">🖼️</div>
                <button class="send-btn" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>

    <div id="knowledgePage" class="page" style="text-align:center;">
        <h3>📚 本地知识库</h3>
        <input type="file" multiple style="margin-top:20px;">
        <button style="margin-left:10px;padding:8px 16px;background:#165dff;color:white;border:none;border-radius:4px;">上传</button>
    </div>

    <div id="searchPage" class="page" style="text-align:center;">
        <h3>🔍 AI 全网搜索</h3>
    </div>
</div>

<script>
    const chatBox = document.getElementById("chatBox");
    const inputText = document.getElementById("inputText");

    function switchPage(page) {
        document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
        document.querySelectorAll(".menu-item").forEach(item => item.classList.remove("active"));
        document.getElementById(page + "Page").classList.add("active");
        event.currentTarget.classList.add("active");
    }

    function sendMessage() {
        const text = inputText.value.trim();
        if (!text) return;

        chatBox.innerHTML += `<div class="bubble bubble-user">${text}</div>`;
        inputText.value = "";

        setTimeout(() => {
            chatBox.innerHTML += `<div class="bubble bubble-ai">AI 正在思考...<br>✅ 已联网搜索<br>✅ 已检索知识库</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }, 600);
    }
</script>

</body>
</html>
